<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAuthn / Passkey 演示</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .card {
            background: #f9fafb;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #e5e7eb;
        }
        .card h2 {
            color: #111827;
            font-size: 1.25rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 20px;
            background: #6366f1;
            border-radius: 3px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .register-btn {
            background: linear-gradient(to right, #10b981, #059669);
            color: white;
        }
        .register-btn:hover {
            background: linear-gradient(to right, #059669, #047857);
            transform: translateY(-1px);
        }
        .login-btn {
            background: linear-gradient(to right, #6366f1, #4f46e5);
            color: white;
        }
        .login-btn:hover {
            background: linear-gradient(to right, #4f46e5, #4338ca);
            transform: translateY(-1px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #9ca3af;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
        .divider span {
            padding: 0 16px;
            font-size: 0.875rem;
        }
        #message {
            padding: 12px 16px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: 500;
            display: none;
        }
        #message.success {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            color: #065f46;
        }
        #message.error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }
        .footer {
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 32px;
            line-height: 1.5;
        }
        #loginStatus {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 WebAuthn 演示</h1>
        <p class="subtitle">使用 Passkey (FIDO2) 无密码认证</p>

        <div id="loginStatus">
            <!-- 登录状态将动态显示在这里 -->
        </div>

        <div class="card">
            <h2>注册新账户</h2>
            <p style="color: #6b7280; margin-bottom: 16px; font-size: 0.95rem;">
                创建一个账户并为其绑定通行密钥（如指纹、面部识别或安全密钥）。
            </p>
            <input type="text" id="regUsername" placeholder="请输入用户名" autocomplete="off">
            <button id="registerBtn" class="register-btn">注册 Passkey</button>
        </div>

        <div class="divider">
            <span>或</span>
        </div>

        <div class="card">
            <h2>登录账户</h2>
            <p style="color: #6b7280; margin-bottom: 16px; font-size: 0.95rem;">
                使用已注册的通行密钥登录您的账户。
            </p>
            <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="off">
            <button id="loginBtn" class="login-btn">使用 Passkey 登录</button>
        </div>

        <div id="message">
            <!-- 消息将动态显示在这里 -->
        </div>

        <div class="footer">
            <p>📱 支持 Windows Hello、Touch ID、Face ID、YubiKey 等认证器</p>
            <p>🌐 后端运行在: <code>http://127.0.0.1:5000</code></p>
        </div>
    </div>

    <!-- 引入 SimpleWebAuthn 浏览器库 -->
    <script type="module" src="/app/webauthn.js"></script>
</body>
</html>
